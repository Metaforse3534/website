<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 &mdash; Not Found</title>

<link rel="icon" type="image/png" href="Public/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="Public/favicon.svg">
<link rel="shortcut icon" href="Public/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="Public/apple-touch-icon.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#fff;
    font-family:Inter,system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:20px;
    max-width:700px;
}

.code{
    font-size:clamp(7rem,20vw,14rem);
    font-weight:800;
    line-height:1;
    color:rgba(255,255,255,.08);
    user-select:none;
}

h1{
    margin-top:-20px;
    font-size:clamp(2rem,5vw,4rem);
    font-weight:700;
    letter-spacing:-.04em;
}

p{
    margin-top:16px;
    color:#8a8a8a;
    font-size:1.1rem;
    line-height:1.6;
}

.buttons{
    margin-top:32px;
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:14px 24px;
    border-radius:999px;
    text-decoration:none;
    font-weight:600;
    transition:.2s ease;
}

.primary{
    background:#fff;
    color:#000;
}

.primary:hover{
    opacity:.9;
}

.secondary{
    border:1px solid rgba(255,255,255,.1);
    color:#fff;
    background:rgba(255,255,255,.03);
}

.secondary:hover{
    background:rgba(255,255,255,.06);
}

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,.04);
    filter:blur(120px);
    border-radius:50%;
    z-index:-1;
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">
    <div class="code">404</div>

    <h1>Page not found</h1>

    <p>
        The page you're looking for doesn't exist or has been moved.
    </p>

    <div class="buttons">
        <a href="/" class="btn primary">Back Home</a>
        <a href="/Routes/doc.html" class="btn primary">Documentation</a>
        <a href="javascript:history.back()" class="btn secondary">Go Back</a>
    </div>
</div>

</body>
</html>
